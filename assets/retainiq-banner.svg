<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" width="760" height="200" font-family="'Space Mono', 'DejaVu Sans Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1e"/>
      <stop offset="1" stop-color="#0d1426"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="textclip">
      <text x="380" y="118" text-anchor="middle" font-size="64" font-weight="700">RetainIQ</text>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="760" height="200" rx="16" fill="url(#bg)"/>

  <!-- rising CRM bubbles -->
  <g fill="#00e5ff">
    <circle cx="90" cy="200" r="5" opacity="0">
      <animate attributeName="cy" values="200;-20" dur="6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0.5;0" dur="6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="200" r="3" opacity="0">
      <animate attributeName="cy" values="200;-20" dur="5s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="200" r="4" opacity="0">
      <animate attributeName="cy" values="200;-20" dur="6.5s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.45;0.45;0" dur="6.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="200" r="6" opacity="0">
      <animate attributeName="cy" values="200;-20" dur="7s" begin="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.35;0.35;0" dur="7s" begin="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g fill="#f59e0b">
    <circle cx="120" cy="200" r="4" opacity="0">
      <animate attributeName="cy" values="200;-20" dur="6.2s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="6.2s" begin="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="670" cy="200" r="3" opacity="0">
      <animate attributeName="cy" values="200;-20" dur="5.5s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.4;0.4;0" dur="5.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- growth bars (left) -->
  <g>
    <rect x="40" y="150" width="9" height="0" rx="2" fill="#00e5ff" opacity="0.7">
      <animate attributeName="height" values="0;18" dur="0.5s" begin="0.6s" fill="freeze"/>
      <animate attributeName="y" values="150;132" dur="0.5s" begin="0.6s" fill="freeze"/>
    </rect>
    <rect x="54" y="150" width="9" height="0" rx="2" fill="#00e5ff" opacity="0.8">
      <animate attributeName="height" values="0;30" dur="0.5s" begin="0.75s" fill="freeze"/>
      <animate attributeName="y" values="150;120" dur="0.5s" begin="0.75s" fill="freeze"/>
    </rect>
    <rect x="68" y="150" width="9" height="0" rx="2" fill="#f59e0b">
      <animate attributeName="height" values="0;46" dur="0.5s" begin="0.9s" fill="freeze"/>
      <animate attributeName="y" values="150;104" dur="0.5s" begin="0.9s" fill="freeze"/>
    </rect>
  </g>

  <!-- growth bars (right, mirrored) -->
  <g>
    <rect x="697" y="150" width="9" height="0" rx="2" fill="#00e5ff" opacity="0.7">
      <animate attributeName="height" values="0;18" dur="0.5s" begin="0.6s" fill="freeze"/>
      <animate attributeName="y" values="150;132" dur="0.5s" begin="0.6s" fill="freeze"/>
    </rect>
    <rect x="711" y="150" width="9" height="0" rx="2" fill="#00e5ff" opacity="0.8">
      <animate attributeName="height" values="0;30" dur="0.5s" begin="0.75s" fill="freeze"/>
      <animate attributeName="y" values="150;120" dur="0.5s" begin="0.75s" fill="freeze"/>
    </rect>
    <rect x="683" y="150" width="9" height="0" rx="2" fill="#f59e0b">
      <animate attributeName="height" values="0;46" dur="0.5s" begin="0.9s" fill="freeze"/>
      <animate attributeName="y" values="150;104" dur="0.5s" begin="0.9s" fill="freeze"/>
    </rect>
  </g>

  <!-- wordmark: Retain (cyan) -->
  <text x="380" y="118" text-anchor="middle" font-size="64" font-weight="700" fill="url(#cyan)" opacity="0">
    <tspan>Retain</tspan><tspan fill="#f59e0b">IQ</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
  </text>

  <!-- IQ bubble pop accent -->
  <circle cx="455" cy="78" r="0" fill="#f59e0b" opacity="0.25">
    <animate attributeName="r" values="0;26;22" dur="0.6s" begin="0.9s" fill="freeze"/>
  </circle>

  <!-- shimmer sweep over the text -->
  <g clip-path="url(#textclip)">
    <rect x="-200" y="60" width="160" height="80" fill="url(#shimmer)" opacity="0.6">
      <animate attributeName="x" values="-200;760" dur="2.5s" begin="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- underline draw -->
  <line x1="300" y1="138" x2="300" y2="138" stroke="#00e5ff" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x2" values="300;460" dur="0.7s" begin="1.1s" fill="freeze"/>
  </line>
</svg>
